# ─────────────────────────────────────────────────────────────
#  CueBI — Local Development Docker Compose
#  Usage: docker-compose up
#  All services start together. Hot-reload enabled for api & web.
# ─────────────────────────────────────────────────────────────


services:
  # ── PostgreSQL (app DB + demo data) ──
  postgres:
    image: postgres:16-alpine
    container_name: cuebi-postgres
    environment:
      POSTGRES_USER: cuebi
      POSTGRES_PASSWORD: cuebi_dev
      POSTGRES_DB: cuebi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./examples/sample_data.sql:/docker-entrypoint-initdb.d/02-demo-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuebi -d cuebi"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Demo DB (user's own database — separate from app DB) ──
  demo-db:
    image: postgres:16-alpine
    container_name: cuebi-demo-db
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo_dev
      POSTGRES_DB: demo_store
    ports:
      - "5433:5432"
    volumes:
      - demodata:/var/lib/postgresql/data
      - ./examples/sample_data.sql:/docker-entrypoint-initdb.d/01-demo.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo_store"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Qdrant (vector DB) ──
  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: cuebi-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

  # ── Redis (Celery broker) ──
  redis:
    image: redis:7-alpine
    container_name: cuebi-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ──
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: cuebi-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cuebi:cuebi_dev@postgres:5432/cuebi
      SYNC_DATABASE_URL: postgresql://cuebi:cuebi_dev@postgres:5432/cuebi
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

  # ── Celery Worker ──
  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: cuebi-worker
    command: celery -A apps.api.tasks worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cuebi:cuebi_dev@postgres:5432/cuebi
      SYNC_DATABASE_URL: postgresql://cuebi:cuebi_dev@postgres:5432/cuebi
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

# ── Next.js Frontend ──
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: cuebi-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      # NextAuth requires these — set real values in .env for Google SSO.
      # For local dev without Google OAuth configured, auth is bypassed on the API side.
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-cuebi-nextauth-dev-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      CUEBI_API_URL: http://api:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  pgdata:
  demodata:
  qdrantdata: